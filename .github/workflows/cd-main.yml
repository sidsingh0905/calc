name: CD - Build & Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calc-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/calc-app:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/calc-app:latest

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calc-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calc-app:latest